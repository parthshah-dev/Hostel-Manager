spring.application.name=hostelmanagement

spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

brevo.api.url=https://api.brevo.com/v3/smtp/email
brevo.api.key=${BREVO_API_KEY}
brevo.sender.name=Hostel Management
brevo.sender.email=hostelease123@gmail.com

application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=86400000

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://hostelease-frontend.vercel.app,http://localhost:5173}

# Frontend URL for activation links sent via email
app.frontend.url=${APP_FRONTEND_URL:https://hostelease-frontend.vercel.app}

# Backend URL for reset password/activation links sent via email
app.backend.url=${APP_BACKEND_URL:https://hostelease-db.onrender.com}
